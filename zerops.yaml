zerops:
  - setup: weather
    build:
      base: bun@1.3
      # No external deps — pure Bun built-ins (Bun.serve, fetch). Nothing to install.
      # Self-deploy: ship the whole source tree so the runtime has src/index.ts + index.html.
      deployFiles:
        - .
    run:
      base: bun@1.3
      ports:
        - port: 3000
          httpSupport: true
      envVariables:
        PORT: "3000"
      start: bun src/index.ts
      healthCheck:
        httpGet:
          port: 3000
          path: /health
